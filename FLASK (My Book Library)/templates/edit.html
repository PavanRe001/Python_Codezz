<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Rating</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #f5f0e8;
      color: #2c1a0e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .card {
      background: #fff8ee;
      border: 1px solid #d9c4a0;
      border-radius: 16px;
      padding: 44px 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #3b1f0a;
      text-align: center;
      margin-bottom: 28px;
    }

    .book-info {
      background: #f0e6d0;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 28px;
    }

    .book-info p {
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #4a2e10;
    }

    .book-info p:last-child { margin-bottom: 0; }

    .book-info span {
      font-weight: 700;
      color: #2c1a0e;
    }

    .badge-rating {
      display: inline-block;
      background: #f0c060;
      color: #3b1f0a;
      border-radius: 20px;
      padding: 2px 12px;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      font-size: 0.88rem;
      color: #5a3a1a;
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d9c4a0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      background: #fffdf7;
      color: #2c1a0e;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input[type="number"]:focus {
      border-color: #c8860a;
      box-shadow: 0 0 0 3px rgba(200,134,10,0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a5a3b, #2e7d55);
      color: #e8f5ee;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #8a6a50;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover { color: #3b1f0a; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <h2>✏️ Edit Rating</h2>

    <div class="book-info">
      <p>📚 <span>{{ book.title }}</span></p>
      <p>Current Rating: <span class="badge-rating">⭐ {{ book.rating }} / 10</span></p>
    </div>

    <form action="{{ url_for('edit') }}" method="POST">
      <input type="hidden" name="id" value="{{ book.id }}" />

      <div class="form-group">
        <label for="new_rating">New Rating (0–10)</label>
        <input type="number" id="new_rating" name="new_rating"
               placeholder="Enter new rating" min="0" max="10" step="0.1" required />
      </div>

      <button type="submit" class="btn-submit">Update Rating</button>
    </form>

    <a class="back-link" href="{{ url_for('home') }}">← Back to Library</a>
  </div>

</body>
</html>
