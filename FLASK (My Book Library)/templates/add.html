<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add a Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #f5f0e8;
      color: #2c1a0e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .card {
      background: #fff8ee;
      border: 1px solid #d9c4a0;
      border-radius: 16px;
      padding: 44px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #3b1f0a;
      text-align: center;
      margin-bottom: 6px;
    }

    .card .subtitle {
      text-align: center;
      color: #8a6a50;
      font-size: 0.9rem;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      font-size: 0.88rem;
      color: #5a3a1a;
      margin-bottom: 7px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d9c4a0;
      border-radius: 10px;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      background: #fffdf7;
      color: #2c1a0e;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #c8860a;
      box-shadow: 0 0 0 3px rgba(200, 134, 10, 0.15);
    }

    .form-group input::placeholder { color: #bba88a; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b1f0a, #6b3a1f);
      color: #f5e6c8;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #8a6a50;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-link:hover { color: #3b1f0a; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <h2>📖 Add a Book</h2>
    <p class="subtitle">Fill in the details to add to your library</p>

    <form action="{{ url_for('add') }}" method="POST">
      <div class="form-group">
        <label for="title">Book Title</label>
        <input type="text" id="title" name="title" placeholder="e.g. The Great Gatsby" required />
      </div>

      <div class="form-group">
        <label for="author">Author</label>
        <input type="text" id="author" name="author" placeholder="e.g. F. Scott Fitzgerald" required />
      </div>

      <div class="form-group">
        <label for="rating">Rating (0–10)</label>
        <input type="number" id="rating" name="rating" placeholder="e.g. 8.5" min="0" max="10" step="0.1" required />
      </div>

      <button type="submit" class="btn-submit">Add to Library</button>
    </form>

    <a class="back-link" href="{{ url_for('home') }}">← Back to Library</a>
  </div>

</body>
</html>
