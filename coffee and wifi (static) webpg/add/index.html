<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    
    <!-- Load Bootstrap-Flask CSS here -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <!-- Link to the styles.css here to apply styling to all the child templates.-->
    <link
      rel="stylesheet"
      href="../static/css/styles.css"
    />
    

    <title>Add A New Cafe</title>
  </head>
  <body>
    
<div class="container">
  <div class="row">
    <div class="col-sm-12 col-md-8">
      <h1>Add a new cafe into the database</h1>

      
    <form action="" method="post"
            class="form" role="form" novalidate>
        <input id="csrf_token" name="csrf_token" type="hidden" value="ImIyMTViNTFiMzdkZWJlNGQzNDViZDhhNWE2Mjc5ZTIxMTgyNmY0MDYi.aanJvg.GSLsCNJYxP_5Wte0kYla8DL68EA">
        
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="cafe">Cafe name</label>
                        <input class="form-control" id="cafe" name="cafe" required type="text" value="">
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="location">Cafe Location on Google Maps (URL)</label>
                        <input class="form-control" id="location" name="location" required type="text" value="">
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="open">Opening Time e.g. 8AM</label>
                        <input class="form-control" id="open" name="open" required type="text" value="">
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="close">Closing Time e.g. 5:30PM</label>
                        <input class="form-control" id="close" name="close" required type="text" value="">
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="coffee_rating">Coffee Rating</label>
                        <select class="form-select" id="coffee_rating" name="coffee_rating" required><option value="☕️">☕️</option><option value="☕☕">☕☕</option><option value="☕☕☕">☕☕☕</option><option value="☕☕☕☕">☕☕☕☕</option><option value="☕☕☕☕☕">☕☕☕☕☕</option></select>
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="wifi_rating">Wifi Strength Rating</label>
                        <select class="form-select" id="wifi_rating" name="wifi_rating" required><option value="✘">✘</option><option value="💪">💪</option><option value="💪💪">💪💪</option><option value="💪💪💪">💪💪💪</option><option value="💪💪💪💪">💪💪💪💪</option><option value="💪💪💪💪💪">💪💪💪💪💪</option></select>
                    
        </div>
    
            

    
    
        
    

    

    
    
    
    
    

    <div class="mb-3 required"><label class="form-label" for="power_rating">Power Socket Availability</label>
                        <select class="form-select" id="power_rating" name="power_rating" required><option value="✘">✘</option><option value="🔌">🔌</option><option value="🔌🔌">🔌🔌</option><option value="🔌🔌🔌">🔌🔌🔌</option><option value="🔌🔌🔌🔌">🔌🔌🔌🔌</option><option value="🔌🔌🔌🔌🔌">🔌🔌🔌🔌🔌</option></select>
                    
        </div>
    
            

    
    

    

    
    
    
    
    

    
        
        
        
    

            
            
            <input class="btn btn-primary btn-md" id="submit" name="submit" type="submit" value="Submit">
        



            
    </form>

      <p class="space-above">
        <a href="../cafes/index.html">See all cafes</a>
      </p>
    </div>
  </div>
</div>


  </body>
</html>
